# This "input" configures a global authorization rule to enable public access to
# all models in this schema. Learn more about authorization rules here: https://docs.amplify.aws/cli/graphql/authorization-rules
input AMPLIFY { globalAuthRule: AuthRule = { allow: public } } # FOR TESTING ONLY!

type Todo @model {
  id: ID!
  name: String!
  description: String
}

type Forum @model {
  id: ID!
  title: String!
  groupName: String!
  description: String
  createdBy: String
  posts: [Post] @hasMany(indexName: "byForum", fields: ["id"])
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type Post @model {
  id: ID!
  body: String!
  author: String!
  createdBy: String
  forumID: ID! @index(name: "byForum")
  forum: Forum @belongsTo(fields: ["forumID"])
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type PersonalEvent @model {
  id: ID!
  title: String!
  date: String!
  time: String
  location: String
  notes: String
  owner: String! @index(name: "byOwner")
}

type GlobalEvent @model {
  id: ID!
  title: String!
  date: String!
  time: String
  location: String
  notes: String
  createdBy: String!
}